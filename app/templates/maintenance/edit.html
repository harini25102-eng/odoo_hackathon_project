{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h2>Edit Maintenance Record</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="alert alert-dismissible fade show" role="alert">
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    <form action="{{ url_for('maintenance.update_maintenance', id=maintenance_record.id) }}" method="POST">
        <div class="form-group">
            <label for="vehicle_id">Vehicle</label>
            <select name="vehicle_id" class="form-control" required>
                <option value="">Select Vehicle</option>
                {% for vehicle in vehicles %}
                    <option value="{{ vehicle.id }}" {% if vehicle.id == maintenance_record.vehicle_id %}selected{% endif %}>{{ vehicle.registration_number }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="issue_description">Issue Description</label>
            <textarea name="issue_description" class="form-control" required>{{ maintenance_record.issue_description }}</textarea>
        </div>
        <div class="form-group">
            <label for="start_date">Start Date</label>
            <input type="date" name="start_date" class="form-control" value="{{ maintenance_record.start_date.strftime('%Y-%m-%d') }}" required>
        </div>
        <div class="form-group">
            <label for="end_date">End Date</label>
            <input type="date" name="end_date" class="form-control" value="{{ maintenance_record.end_date.strftime('%Y-%m-%d') if maintenance_record.end_date else '' }}">
        </div>
        <div class="form-group">
            <label for="status">Status</label>
            <select name="status" class="form-control" required>
                <option value="Scheduled" {% if maintenance_record.status == 'Scheduled' %}selected{% endif %}>Scheduled</option>
                <option value="In Progress" {% if maintenance_record.status == 'In Progress' %}selected{% endif %}>In Progress</option>
                <option value="Completed" {% if maintenance_record.status == 'Completed' %}selected{% endif %}>Completed</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Update</button>
        <a href="{{ url_for('maintenance.list_maintenance') }}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
