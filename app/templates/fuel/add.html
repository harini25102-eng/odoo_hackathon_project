{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h2>Add Fuel Log</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="alert alert-dismissible fade show" role="alert">
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    <form action="{{ url_for('fuel.create_fuel') }}" method="POST">
        <div class="form-group">
            <label for="vehicle_id">Vehicle</label>
            <select name="vehicle_id" class="form-control" required>
                <option value="">Select Vehicle</option>
                {% for vehicle in vehicles %}
                    <option value="{{ vehicle.id }}">{{ vehicle.registration_number }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="liters">Liters</label>
            <input type="number" name="liters" class="form-control" step="0.01" required>
        </div>
        <div class="form-group">
            <label for="cost">Cost</label>
            <input type="number" name="cost" class="form-control" step="0.01" required>
        </div>
        <div class="form-group">
            <label for="date">Date</label>
            <input type="date" name="date" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary">Submit</button>
        <a href="{{ url_for('fuel.list_fuel') }}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
