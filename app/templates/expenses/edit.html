{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <h2 class="mb-4">Edit Expense</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">

        <div class="mb-3">

            <label class="form-label">Vehicle</label>

            <select class="form-control" name="vehicle_id" required>

                {% for vehicle in vehicles %}

                    <option
                        value="{{ vehicle.id }}"
                        {% if vehicle.id == expense.vehicle_id %}selected{% endif %}>

                        {{ vehicle.registration_number }} - {{ vehicle.name }}

                    </option>

                {% endfor %}

            </select>

        </div>

        <div class="mb-3">

            <label class="form-label">Expense Type</label>

            <select class="form-control" name="expense_type" required>

                <option value="Fuel" {% if expense.expense_type=="Fuel" %}selected{% endif %}>Fuel</option>

                <option value="Maintenance" {% if expense.expense_type=="Maintenance" %}selected{% endif %}>Maintenance</option>

                <option value="Toll" {% if expense.expense_type=="Toll" %}selected{% endif %}>Toll</option>

                <option value="Parking" {% if expense.expense_type=="Parking" %}selected{% endif %}>Parking</option>

                <option value="Insurance" {% if expense.expense_type=="Insurance" %}selected{% endif %}>Insurance</option>

                <option value="Repair" {% if expense.expense_type=="Repair" %}selected{% endif %}>Repair</option>

                <option value="Other" {% if expense.expense_type=="Other" %}selected{% endif %}>Other</option>

            </select>

        </div>

        <div class="mb-3">

            <label class="form-label">Cost (₹)</label>

            <input
                type="number"
                step="0.01"
                class="form-control"
                name="cost"
                value="{{ expense.cost }}"
                required>

        </div>

        <div class="mb-4">

            <label class="form-label">Expense Date</label>

            <input
                type="date"
                class="form-control"
                name="date"
                value="{{ expense.date.strftime('%Y-%m-%d') }}"
                required>

        </div>

        <button
            type="submit"
            class="btn btn-success">

            Update Expense

        </button>

        <a
            href="{{ url_for('expenses.list_expenses') }}"
            class="btn btn-secondary">

            Cancel

        </a>

    </form>

</div>

{% endblock %}
